services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - vista_uploads:/app/uploads
      - vista_outputs:/app/outputs
      - vista_db:/app
    environment:
      - SECRET_KEY=vista-production-secret-change-me
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vista_uploads:
  vista_outputs:
  vista_db:
